<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; color: #1a1a1a; }

    header {
      background: #111;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header nav { display: flex; gap: 24px; }
    header a { color: #ccc; text-decoration: none; }

    .hero {
      padding: 80px 40px;
      text-align: center;
      background: #f5f5f5;
    }
    .hero h1 { font-size: 2.5rem; margin-bottom: 16px; }
    .hero p { font-size: 1.1rem; color: #555; max-width: 600px; margin: 0 auto 24px; }
    .hero button {
      background: #111;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .features {
      padding: 60px 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 24px;
    }
    .card h3 { margin-bottom: 8px; }
    .card p { color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>

  <header data-comment="Основний хедер сайту з логотипом і навігацією">
    <div data-comment="Логотип або назва продукту">Logo</div>
    <nav>
      <a href="#" data-comment="Посилання на головну сторінку">Головна</a>
      <a href="#" data-comment="Посилання на сторінку про компанію">Про нас</a>
      <a href="#" data-comment="Посилання на сторінку контактів">Контакти</a>
    </nav>
  </header>

  <section class="hero" data-comment="Hero секція з основним меседжем і CTA">
    <h1 data-comment="Головний заголовок сторінки (value proposition)">Заголовок сторінки</h1>
    <p data-comment="Короткий опис продукту або сервісу">Короткий опис того, що ця сторінка пропонує. Тут може бути будь-який текст.</p>
    <button data-comment="Кнопка заклику до дії (CTA)">Почати</button>
  </section>

  <section class="features" data-comment="Секція з ключовими перевагами продукту">
    <div class="card" data-comment="Окрема перевага або feature">
      <h3 data-comment="Назва переваги">Швидкість</h3>
      <p data-comment="Опис переваги">Все працює блискавично без затримок.</p>
    </div>
    <div class="card" data-comment="Окрема перевага або feature">
      <h3 data-comment="Назва переваги">Простота</h3>
      <p data-comment="Опис переваги">Інтуїтивний інтерфейс без зайвого.</p>
    </div>
    <div class="card" data-comment="Окрема перевага або feature">
      <h3 data-comment="Назва переваги">Надійність</h3>
      <p data-comment="Опис переваги">Стабільна робота 24/7.</p>
    </div>
  </section>

</body>
</html>
